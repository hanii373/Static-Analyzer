name: SAST Scan

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install semgrep bandit

      - name: Run SAST scan
        run: |
          python -m sast_tool.cli scan . --format sarif > report.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: report.sarif
